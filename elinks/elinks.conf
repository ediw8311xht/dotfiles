## ELinks 0.20.GIT configuration file

## This is ELinks configuration file. You can edit it manually,
## if you wish so; this file is edited by ELinks when you save
## options through UI, however only option values will be altered
## and missing options will be added at the end of file; if option
## is not written in this file, but in some file included from it,
## it is NOT counted as missing. Note that all your formatting,
## own comments and so on will be kept as-is.
##
## Obviously, if you don't like what ELinks is going to do with
## this file, you can change it by altering the config.saving_style
## option. Come on, aren't we friendly guys after all?



##############################
# Automatically saved options
#

## config 
#  Configuration handling options.

  ## config.saving_style_w [0|1]
  #  This is internal option used when displaying a warning about obsolete
  #  config.saving_style. You shouldn't touch it.
  set config.saving_style_w = 1


## ecmascript 
#  ECMAScript options.

  ## ecmascript.spidermonkey 
  #  Options specific to Spidermonkey.

    ## ecmascript.spidermonkey.memory_limit <num>
    #  Runtime memory limit in bytes.
    set ecmascript.spidermonkey.memory_limit = 2048M



## ui 
#  User interface options.

  ## ui.language <language>
  #  Language of user interface. 'System' means that the language will be
  #  extracted from the environment dynamically.
  set ui.language = "System"





##############################
# Automatically saved options
#

## terminal 
#  Terminal options.

  ## terminal.kitty 
  #  Options specific to this terminal type (according to $TERM value).

    ## terminal.kitty.underline [0|1]
    set terminal.kitty.underline = 1
    ## terminal.kitty.strike [0|1]
    set terminal.kitty.strike = 1
    ## terminal.kitty.kitty [0|1]
    set terminal.kitty.kitty = 1
    ## terminal.kitty.italic [0|1]
    set terminal.kitty.italic = 1
    ## terminal.kitty.transparency [0|1]
    set terminal.kitty.transparency = 1
    ## terminal.kitty.colors <num>
    set terminal.kitty.colors = 4
    ## terminal.kitty.block_cursor [0|1]
    set terminal.kitty.block_cursor = 1
    ## terminal.kitty.utf_8_io [0|1]
    set terminal.kitty.utf_8_io = 1
    ## terminal.kitty.type <num>
    set terminal.kitty.type = 2


## ui 
#  User interface options.

  ## ui.colors 
  #  Default user interface color settings.

    ## ui.colors.color 
    #  Color settings for color terminal.

      ## ui.colors.color.menu 
      #  Menu bar colors.

        ## ui.colors.color.menu.frame 
        #  Menu frame colors.

          ## ui.colors.color.menu.frame.text <color|#rrggbb>
          #  Default text color.
          set ui.colors.color.menu.frame.text = "#009900"

          ## ui.colors.color.menu.frame.background <color|#rrggbb>
          #  Default background color.
          set ui.colors.color.menu.frame.background = "#111111"



      ## ui.colors.color.desktop 
      #  Desktop background.

        ## ui.colors.color.desktop.text <color|#rrggbb>
        #  Default text color.
        set ui.colors.color.desktop.text = "gray60"

        ## ui.colors.color.desktop.background <color|#rrggbb>
        #  Default background color.
        set ui.colors.color.desktop.background = "black"


      ## ui.colors.color.searched 
      #  Searched string highlight colors.

        ## ui.colors.color.searched.text <color|#rrggbb>
        #  Default text color.
        set ui.colors.color.searched.text = "black"

        ## ui.colors.color.searched.background <color|#rrggbb>
        #  Default background color.
        set ui.colors.color.searched.background = "#009900"




  ## ui.sessions 
  #  Sessions settings.

    ## ui.sessions.auto_restore [0|1]
    #  Automatically restore the session at start.
    #  
    #  This feature requires bookmark support.
    set ui.sessions.auto_restore = 1

    ## ui.sessions.auto_save [0|1]
    #  Automatically save the session when quitting.
    #  
    #  This feature requires bookmark support.
    set ui.sessions.auto_save = 1

    ## ui.sessions.auto_save_foldername <str>
    #  Name of the bookmarks folder used for auto saving and restoring session.
    #  The name has to be unique. Any folders with the same name will be
    #  deleted.
    #  
    #  This only makes sense with bookmark support.
    set ui.sessions.auto_save_foldername = "auto_sessions"

    ## ui.sessions.auto_save_positions [0|1]
    #  Whether to save view positions of documents.
    #  
    #  This feature requires bookmark support.
    set ui.sessions.auto_save_positions = 1

    ## ui.sessions.homepage <str>
    #  The URI to load either at startup time when no URI was given on the
    #  command line or when requested by the goto-url-home action. Set to "" if
    #  the environment variable WWW_HOME should be used as homepage URI instead.
    set ui.sessions.homepage = "www.duckduckgo.com"

    ## ui.sessions.keep_session_active [0|1]
    #  Keep the session active even if the last terminal exits.
    set ui.sessions.keep_session_active = 0

    ## ui.sessions.postpone_unlink [0|1]
    #  Clean temporary files (created for example while viewing images) at exit
    #  of ELinks not immediately after preview.
    set ui.sessions.postpone_unlink = 1


  ## ui.tabs 
  #  Window tabs settings.

    ## ui.tabs.display_type <num>
    #  What to display in tab manager dialog:
    #  0 is URLs
    #  1 is page titles
    set ui.tabs.display_type = 1

    ## ui.tabs.show_bar <num>
    #  Show tabs bar on the screen:
    #  0 means never
    #  1 means only if two or more tabs are open
    #  2 means always
    set ui.tabs.show_bar = 2

    ## ui.tabs.top [0|1]
    #  Whether display tab bar at top like other browsers do.
    set ui.tabs.top = 1

    ## ui.tabs.wraparound [0|1]
    #  When moving right from the last tab, jump to the first one, and vice
    #  versa.
    set ui.tabs.wraparound = 1

    ## ui.tabs.confirm_close [0|1]
    #  When closing a tab show confirmation dialog.
    set ui.tabs.confirm_close = 0


  ## ui.show_menu_bar_always [0|1]
  #  Always show menu bar on the screen.
  set ui.show_menu_bar_always = 1

  ## ui.show_status_bar [0|1]
  #  Show status bar on the screen.
  set ui.show_status_bar = 1

  ## ui.show_title_bar [0|1]
  #  Show title bar on the screen.
  set ui.show_title_bar = 1

  ## ui.tostop [0|1]
  #  Whether to disallow writing to terminal by background processes.
  set ui.tostop = 1

  ## ui.window_title [0|1]
  #  Set the window title when running in a windowing environment in an
  #  xterm-like terminal. This way the document's title is shown on the window
  #  titlebar.
  set ui.window_title = 1





